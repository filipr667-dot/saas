<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Endpoint Monitoring Dashboard</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #0f1220;
    --panel: #171b2e;
    --border: #2a2f47;
    --text: #e6e8f0;
    --muted: #8c92ad;
    --online: #2ecc71;
    --offline: #e74c3c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 2rem;
    font-family: -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  h1 { margin: 0 0 0.25rem; font-size: 1.5rem; }
  p.subtitle { margin: 0 0 1.5rem; color: var(--muted); font-size: 0.9rem; }
  table {
    width: 100%;
    border-collapse: collapse;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  th, td {
    text-align: left;
    padding: 0.75rem 1rem;
    border-bottom: 1px solid var(--border);
    font-size: 0.9rem;
  }
  th {
    color: var(--muted);
    text-transform: uppercase;
    font-size: 0.75rem;
    letter-spacing: 0.05em;
  }
  tr:last-child td { border-bottom: none; }
  .status {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    font-weight: 600;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }
  .online .dot { background: var(--online); }
  .online { color: var(--online); }
  .offline .dot { background: var(--offline); }
  .offline { color: var(--offline); }
  .empty {
    padding: 2rem;
    text-align: center;
    color: var(--muted);
  }
  .footer {
    margin-top: 1rem;
    font-size: 0.8rem;
    color: var(--muted);
  }
</style>
</head>
<body>
  <h1>Endpoint Monitoring Dashboard</h1>
  <p class="subtitle">Phase 1 prototype &mdash; auto-refreshes every 10 seconds</p>

  <table>
    <thead>
      <tr>
        <th>Hostname</th>
        <th>Username</th>
        <th>OS Version</th>
        <th>Last Check-In</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="device-rows"></tbody>
  </table>
  <div id="empty-state" class="empty" style="display:none;">No devices have checked in yet.</div>

  <div class="footer">Last refreshed: <span id="last-refreshed">-</span></div>

<script>
  const REFRESH_INTERVAL_MS = 10000;

  // Render a device row's local check-in time from an ISO-8601 timestamp.
  function formatTimestamp(iso) {
    const date = new Date(iso);
    if (isNaN(date.getTime())) return iso;
    return date.toLocaleString();
  }

  async function refreshDevices() {
    try {
      const response = await fetch('/devices', { cache: 'no-store' });
      if (!response.ok) {
        throw new Error(`Backend returned ${response.status}`);
      }
      const devices = await response.json();
      renderDevices(devices);
      document.getElementById('last-refreshed').textContent = new Date().toLocaleTimeString();
    } catch (err) {
      console.error('Failed to refresh devices:', err);
    }
  }

  function renderDevices(devices) {
    const tbody = document.getElementById('device-rows');
    const emptyState = document.getElementById('empty-state');

    if (!devices.length) {
      tbody.innerHTML = '';
      emptyState.style.display = 'block';
      return;
    }
    emptyState.style.display = 'none';

    tbody.innerHTML = devices.map((device) => {
      const statusClass = device.online ? 'online' : 'offline';
      const statusLabel = device.online ? 'Online' : 'Offline';
      return `
        <tr>
          <td>${escapeHtml(device.hostname)}</td>
          <td>${escapeHtml(device.username)}</td>
          <td>${escapeHtml(device.os_version)}</td>
          <td>${escapeHtml(formatTimestamp(device.last_checkin))}</td>
          <td><span class="status ${statusClass}"><span class="dot"></span>${statusLabel}</span></td>
        </tr>
      `;
    }).join('');
  }

  function escapeHtml(value) {
    const div = document.createElement('div');
    div.textContent = value ?? '';
    return div.innerHTML;
  }

  refreshDevices();
  setInterval(refreshDevices, REFRESH_INTERVAL_MS);
</script>
</body>
</html>
